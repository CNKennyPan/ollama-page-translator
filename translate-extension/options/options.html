<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollama 翻译 - 设置</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>Ollama 翻译 · 设置</h1>

    <section class="section">
      <h2>Ollama 连接</h2>
      <div class="field">
        <label for="ollamaHost">服务地址</label>
        <input type="text" id="ollamaHost" placeholder="http://127.0.0.1:11434" />
        <p class="hint">Ollama 服务的地址，默认 http://127.0.0.1:11434</p>
      </div>
    </section>

    <section class="section">
      <h2>翻译模型</h2>
      <div class="field">
        <label for="model">模型名称</label>
        <input type="text" id="model" placeholder="huihui_ai/hy-mt1.5-abliterated:1.8b" list="modelList" />
        <datalist id="modelList"></datalist>
        <p class="hint">输入模型名称，或点击「检测」从 Ollama 获取已安装模型</p>
      </div>
      <div class="field-row">
        <button id="detectModelsBtn" class="btn btn-outline">检测已安装模型</button>
        <span id="detectResult" class="detect-result"></span>
      </div>
    </section>

    <section class="section">
      <h2>默认语言</h2>
      <div class="field-row">
        <div class="field half">
          <label for="defaultSourceLang">默认源语言</label>
          <select id="defaultSourceLang">
            <option value="auto">自动检测</option>
            <option value="en">英语</option>
            <option value="zh-CN">中文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="pt">葡萄牙语</option>
            <option value="it">意大利语</option>
          </select>
        </div>
        <div class="field half">
          <label for="defaultTargetLang">默认目标语言</label>
          <select id="defaultTargetLang">
            <option value="zh-CN">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="pt">葡萄牙语</option>
            <option value="it">意大利语</option>
          </select>
        </div>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary">保存设置</button>
      <span id="saveResult" class="save-result"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
