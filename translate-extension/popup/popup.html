<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollama Translator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Ollama 翻译</h1>

    <div class="lang-row">
      <div class="lang-group">
        <label for="sourceLang">从</label>
        <select id="sourceLang">
          <option value="auto">自动检测</option>
          <option value="en">英语</option>
          <option value="zh-CN">中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="pt">葡萄牙语</option>
          <option value="it">意大利语</option>
          <option value="ar">阿拉伯语</option>
          <option value="vi">越南语</option>
          <option value="th">泰语</option>
        </select>
      </div>

      <div class="swap-btn" id="swapLang" title="交换语言">⇄</div>

      <div class="lang-group">
        <label for="targetLang">到</label>
        <select id="targetLang">
          <option value="zh-CN">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="pt">葡萄牙语</option>
          <option value="it">意大利语</option>
          <option value="ar">阿拉伯语</option>
          <option value="vi">越南语</option>
          <option value="th">泰语</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="translateBtn" class="btn btn-primary">翻译页面</button>
      <button id="restoreBtn" class="btn btn-secondary" disabled>还原原文</button>
    </div>

    <div id="progressArea" class="progress-area hidden">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText" class="progress-text">准备中...</p>
    </div>

    <div id="statusArea" class="status-area hidden">
      <p id="statusText"></p>
    </div>

    <div class="footer">
      <span id="modelDisplay" class="model-label"></span>
      <a href="#" id="openOptions" class="settings-link">设置</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
